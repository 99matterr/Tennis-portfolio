<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamlined Tennis Tracker</title>
    <style>
        :root {
            --bg-main: #f5f5f7;
            --bg-card: #ffffff;
            --accent-blue: #0071e3;
            --accent-yellow: #ffcc00;
            --accent-red: #ff3b30;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --border-color: #e8e8ed;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .tennis-app {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 950px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            padding-bottom: 25px;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            background-color: var(--accent-blue);
            padding: 14px 20px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
        }

        .match-type-bar {
            background-color: #fafafa;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .mode-btn {
            flex: 1;
            min-width: 90px;
            background: #e8e8ed;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .mode-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .selector-dropdown {
            flex: 1.5;
            min-width: 160px;
            background: #e8e8ed;
            border: none;
            color: var(--text-main);
            padding: 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            text-align: center;
        }

        .set-game-row {
            background-color: #ffffff;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .team-section-title {
            font-size: 0.8rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
        }

        .player-identity {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .server-dot {
            width: 10px;
            height: 10px;
            background-color: transparent;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .server-dot.serving {
            background-color: var(--accent-yellow);
            border-color: #e6b800;
            box-shadow: 0 0 6px rgba(255, 204, 0, 0.6);
        }

        .editable-name {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            width: 70%;
            border-bottom: 1px dashed transparent;
        }

        .editable-name:focus {
            border-bottom-color: var(--accent-blue);
        }

        .match-score-badge {
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.95rem;
        }

        .dashboard-main-body {
            display: flex;
            flex-direction: row;
            background-color: #fafafa;
            border-bottom: 1px solid var(--border-color);
        }

        .side-action-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            background-color: #ffffff;
        }

        .side-action-panel.left-side { border-right: 1px solid var(--border-color); }
        .side-action-panel.right-side { border-left: 1px solid var(--border-color); }

        .main-display {
            flex: 1.2;
            padding: 30px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #fafafa;
        }

        .score-block {
            text-align: center;
            flex: 1;
        }

        .score-label {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .big-score {
            font-size: 5.5rem;
            font-weight: 800;
            line-height: 1;
            color: var(--text-main);
        }

        .player-action-card {
            background: #f5f5f7;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e8e8ed;
            width: 100%;
            box-sizing: border-box;
        }

        .player-action-card span {
            font-size: 0.85rem;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-buttons-container { display: flex; gap: 6px; }

        .stat-trigger-btn {
            width: 100%;
            border: none;
            padding: 12px 4px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .stat-trigger-btn:hover { opacity: 0.9; }
        .btn-win { background-color: var(--accent-blue); }
        .btn-err { background-color: var(--accent-red); }

        .stats-container {
            padding: 20px;
            background-color: #ffffff;
            border-bottom: 1px solid var(--border-color);
        }

        .chart-layout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 15px;
        }

        @media (min-width: 600px) {
            .chart-layout-grid { grid-template-columns: 1fr 1fr; }
        }

        .player-chart-card {
            background: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px;
        }

        .chart-player-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .graph-metric-row { margin-bottom: 8px; }

        .graph-meta-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .bar-track {
            background: #e8e8ed;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            width: 100%;
        }

        .bar-fill-indicator {
            height: 100%;
            width: 0%;
            border-radius: 5px;
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .bar-fill-indicator.win-fill { background-color: var(--accent-blue); }
        .bar-fill-indicator.err-fill { background-color: var(--accent-red); }

        .utility-container {
            padding: 20px 20px 0;
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d2d2d7;
            background: #ffffff;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn:hover { background: #f5f5f7; }

        .action-btn.view-btn {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #ffffff;
        }

        .action-btn.view-btn:hover { background-color: #0056b3; border-color: #0056b3; }
        .action-btn.reset-btn { background-color: #1d1d1f; border-color: #1d1d1f; color: #ffffff; }
        .action-btn.reset-btn:hover { background-color: #000000; }

        .modal-overlay-frame {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.40);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .modal-wrapper {
            background: #ffffff;
            border-radius: 24px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: modalPop 0.25s ease-out;
        }

        @keyframes modalPop {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .modal-title { font-weight: 700; font-size: 1.1rem; }
        .close-modal-x { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-muted); }

        .preview-scroll-pane {
            background: #f5f5f7;
            padding: 16px;
            border-radius: 14px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            color: #333;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .dashboard-main-body { flex-direction: column; }
            .side-action-panel.left-side { border-right: none; border-bottom: 1px solid var(--border-color); }
            .side-action-panel.right-side { border-left: none; border-top: 1px solid var(--border-color); }
            .main-display { order: -1; padding: 20px 10px; }
            .side-action-panel { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="tennis-app">
    <div class="app-header">
        <span>🎾 Scorekeeper Pro MVP</span>
        <span id="current-date">July 6, 2026</span>
    </div>

    <div class="match-type-bar">
        <button class="mode-btn active" id="mode-singles" onclick="switchMatchMode('singles')">Singles</button>
        <button class="mode-btn" id="mode-doubles" onclick="switchMatchMode('doubles')">Doubles</button>
        <button class="mode-btn" id="mode-noad" onclick="toggleNoAdMode()">Advantage</button>
        
        <!-- NEW SCORING SYSTEM SELECTOR -->
        <select class="selector-dropdown" id="format-selector" onchange="switchMatchFormat(this.value)">
            <option value="standard">Standard Set (6 Games)</option>
            <option value="short">Short Set (4 Games / Fast4)</option>
            <option value="pro">Pro Set (8 Games)</option>
            <option value="tiebreak7">7-Point Tiebreak Match</option>
            <option value="tiebreak10">10-Point Tiebreak Match</option>
        </select>
    </div>

    <div class="set-game-row">
        <div class="team-section-title" id="title-t1">Team 1</div>
        <div class="player-row" id="row-p1a">
            <div class="player-identity">
                <div class="server-dot serving" id="dot-p1a" onclick="setServerDirect(1)"></div>
                <input type="text" class="editable-name" value="Player 1" id="name-p1a" oninput="syncLabels()">
            </div>
            <div class="match-score-badge" id="badge-t1">0 Sets (0 Games)</div>
        </div>
        <div class="player-row" id="row-p1b" style="display: none;">
            <div class="player-identity">
                <div class="server-dot" id="dot-p1b" onclick="setServerDirect(2)"></div>
                <input type="text" class="editable-name" value="Partner 1" id="name-p1b" oninput="syncLabels()">
            </div>
        </div>

        <div class="team-section-title" id="title-t2" style="margin-top: 5px;">Team 2</div>
        <div class="player-row" id="row-p2a">
            <div class="player-identity">
                <div class="server-dot" id="dot-p2a" onclick="setServerDirect(3)"></div>
                <input type="text" class="editable-name" value="Player 2" id="name-p2a" oninput="syncLabels()">
            </div>
            <div class="match-score-badge" id="badge-t2">0 Sets (0 Games)</div>
        </div>
        <div class="player-row" id="row-p2b" style="display: none;">
            <div class="player-identity">
                <div class="server-dot" id="dot-p2b" onclick="setServerDirect(4)"></div>
                <input type="text" class="editable-name" value="Partner 2" id="name-p2b" oninput="syncLabels()">
            </div>
        </div>
    </div>

    <div class="dashboard-main-body">
        
        <div class="side-action-panel left-side">
            <div class="team-section-title" id="card-t1-title">Team 1 Actions</div>
            <div class="player-action-card" id="card-p1a">
                <span id="lbl-btn-p1a">Player 1</span>
                <div class="action-buttons-container">
                    <button class="stat-trigger-btn btn-win" onclick="logPointDirect(1, 1, 'Winner')">Winner</button>
                    <button class="stat-trigger-btn btn-err" onclick="logPointDirect(2, 1, 'Error')">Error</button>
                </div>
            </div>
            <div class="player-action-card" id="card-p1b" style="display: none;">
                <span id="lbl-btn-p1b">Partner 1</span>
                <div class="action-buttons-container">
                    <button class="stat-trigger-btn btn-win" onclick="logPointDirect(1, 2, 'Winner')">Winner</button>
                    <button class="stat-trigger-btn btn-err" onclick="logPointDirect(2, 2, 'Error')">Error</button>
                </div>
            </div>
        </div>

        <div class="main-display">
            <div class="score-block">
                <div class="score-label" id="lbl-t1">Team 1</div>
                <div class="big-score" id="score-t1">0</div>
            </div>
            <div class="score-block">
                <div class="score-label" id="lbl-t2">Team 2</div>
                <div class="big-score" id="score-t2">0</div>
            </div>
        </div>

        <div class="side-action-panel right-side">
            <div class="team-section-title" id="card-t2-title">Team 2 Actions</div>
            <div class="player-action-card" id="card-p2a">
                <span id="lbl-btn-p2a">Player 2</span>
                <div class="action-buttons-container">
                    <button class="stat-trigger-btn btn-win" onclick="logPointDirect(2, 3, 'Winner')">Winner</button>
                    <button class="stat-trigger-btn btn-err" onclick="logPointDirect(1, 3, 'Error')">Error</button>
                </div>
            </div>
            <div class="player-action-card" id="card-p2b" style="display: none;">
                <span id="lbl-btn-p2b">Partner 2</span>
                <div class="action-buttons-container">
                    <button class="stat-trigger-btn btn-win" onclick="logPointDirect(2, 4, 'Winner')">Winner</button>
                    <button class="stat-trigger-btn btn-err" onclick="logPointDirect(1, 4, 'Error')">Error</button>
                </div>
            </div>
        </div>

    </div>

    <div class="stats-container">
        <div class="team-section-title">Live Match Progress Charts</div>
        <div class="chart-layout-grid" id="charts-wrapper-target"></div>
    </div>

    <div class="utility-container">
        <button class="action-btn" onclick="undoPoint()">Undo Point ↩</button>
        <button class="action-btn view-btn" onclick="openReportModal()">View Summary Report 📋</button>
        <button class="action-btn reset-btn" onclick="resetMatch()">Reset Match</button>
    </div>
</div>

<div class="modal-overlay-frame" id="report-modal">
    <div class="modal-wrapper">
        <div class="modal-header-row">
            <div class="modal-title">📄 Match Data Report Preview</div>
            <button class="close-modal-x" onclick="closeReportModal()">&times;</button>
        </div>
        <div>
            <span class="team-section-title">Structured Plain Document Output (CSV Format)</span>
        </div>
        <div class="preview-scroll-pane" id="report-preview-box"></div>
        <div style="display:flex; gap:10px; margin-top:5px;">
            <button class="action-btn" onclick="closeReportModal()">Close Preview</button>
            <button class="action-btn view-btn" onclick="downloadStats()">Download Document (.CSV)</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'minimal_tennis_tracker_v3';

    let state = {
        matchMode: 'singles',
        matchFormat: 'standard',
        isTiebreak: false,
        noAd: false,
        currentServer: 1, 
        scoreData: {
            t1: { points: 0, games: 0, sets: 0 },
            t2: { points: 0, games: 0, sets: 0 }
        },
        stats: {
            1: { winners: 0, errors: 0 },
            2: { winners: 0, errors: 0 },
            3: { winners: 0, errors: 0 },
            4: { winners: 0, errors: 0 }
        },
        history: []
    };

    const scoreMap = ["0", "15", "30", "40", "A"];

    function getPlayerName(num) {
        if (num === 1) return document.getElementById('name-p1a').value || "Player 1";
        if (num === 2) return document.getElementById('name-p1b').value || "Partner 1";
        if (num === 3) return document.getElementById('name-p2a').value || "Player 2";
        if (num === 4) return document.getElementById('name-p2b').value || "Partner 2";
        return "";
    }

    function syncLabels() {
        const isSingles = (state.matchMode === 'singles');
        document.getElementById('title-t1').innerText = isSingles ? getPlayerName(1) : "Team 1";
        document.getElementById('title-t2').innerText = isSingles ? getPlayerName(3) : "Team 2";
        document.getElementById('lbl-t1').innerText = isSingles ? getPlayerName(1) : "Team 1";
        document.getElementById('lbl-t2').innerText = isSingles ? getPlayerName(3) : "Team 2";
        
        document.getElementById('card-t1-title').innerText = isSingles ? `${getPlayerName(1)} Actions` : "Team 1 Actions";
        document.getElementById('card-t2-title').innerText = isSingles ? `${getPlayerName(3)} Actions` : "Team 2 Actions";

        document.getElementById('lbl-btn-p1a').innerText = getPlayerName(1);
        document.getElementById('lbl-btn-p1b').innerText = getPlayerName(2);
        document.getElementById('lbl-btn-p2a').innerText = getPlayerName(3);
        document.getElementById('lbl-btn-p2b').innerText = getPlayerName(4);
        
        renderPerformanceCharts();
        saveState();
    }

    function switchMatchMode(mode) {
        state.matchMode = mode;
        document.getElementById('mode-singles').classList.toggle('active', mode === 'singles');
        document.getElementById('mode-doubles').classList.toggle('active', mode === 'doubles');

        const isDoubles = (mode === 'doubles');
        document.getElementById('row-p1b').style.display = isDoubles ? 'flex' : 'none';
        document.getElementById('row-p2b').style.display = isDoubles ? 'flex' : 'none';
        document.getElementById('card-p1b').style.display = isDoubles ? 'block' : 'none';
        document.getElementById('card-p2b').style.display = isDoubles ? 'block' : 'none';

        if (!isDoubles && (state.currentServer === 2 || state.currentServer === 4)) {
            state.currentServer = 1;
        }
        syncLabels();
        renderDisplay();
    }

    function switchMatchFormat(format) {
        if (state.history.length > 0 && !confirm("Changing the match structure midway will clear or reset parts of your current scoring history. Continue?")) {
            document.getElementById('format-selector').value = state.matchFormat;
            return;
        }
        state.matchFormat = format;
        state.isTiebreak = (format === 'tiebreak7' || format === 'tiebreak10');
        
        // Hide/show the Advantage/No-Ad option if it's a standalone tiebreak match
        document.getElementById('mode-noad').style.display = state.isTiebreak ? 'none' : 'block';
        
        resetScorePreservingStats();
    }

    function resetScorePreservingStats() {
        state.scoreData = {
            t1: { points: 0, games: 0, sets: 0 },
            t2: { points: 0, games: 0, sets: 0 }
        };
        state.currentServer = 1;
        state.history = [];
        renderDisplay();
    }

    function toggleNoAdMode() {
        state.noAd = !state.noAd;
        renderNoAdButton();
        saveState();
    }

    function renderNoAdButton() {
        const btn = document.getElementById('mode-noad');
        if (state.noAd) {
            btn.classList.add('active');
            btn.innerText = "No-Ad";
        } else {
            btn.classList.remove('active');
            btn.innerText = "Advantage";
        }
    }

    function setServerDirect(num) {
        state.currentServer = num;
        renderDisplay();
    }

    function rotateServerAuto() {
        if (state.matchMode === 'singles') {
            state.currentServer = (state.currentServer === 1) ? 3 : 1;
        } else {
            let order = [1, 3, 2, 4];
            let idx = order.indexOf(state.currentServer);
            state.currentServer = order[(idx + 1) % 4];
        }
    }

    function logPointDirect(winningTeamNum, playerActed, type) {
        state.history.push(JSON.parse(JSON.stringify({
            scoreData: state.scoreData,
            currentServer: state.currentServer,
            stats: state.stats,
            isTiebreak: state.isTiebreak
        })));

        if (type === 'Winner') state.stats[playerActed].winners++;
        else if (type === 'Error') state.stats[playerActed].errors++;

        let scorer = (winningTeamNum === 1) ? state.scoreData.t1 : state.scoreData.t2;
        let opponent = (winningTeamNum === 1) ? state.scoreData.t2 : state.scoreData.t1;

        scorer.points++;

        // STANDALONE TIEBREAKER MATCH SCORING
        if (state.matchFormat === 'tiebreak7' || state.matchFormat === 'tiebreak10') {
            let targetPoints = (state.matchFormat === 'tiebreak7') ? 7 : 10;
            if ((state.scoreData.t1.points + state.scoreData.t2.points) % 2 !== 0) rotateServerAuto();
            
            if (scorer.points >= targetPoints && (scorer.points - opponent.points) >= 2) {
                scorer.sets++;
                state.scoreData.t1.points = 0;
                state.scoreData.t2.points = 0;
            }
            renderDisplay();
            return;
        }

        // SET-BASED TIEBREAKER LOGIC ROUTER
        if (state.isTiebreak) {
            if ((state.scoreData.t1.points + state.scoreData.t2.points) % 2 !== 0) rotateServerAuto();
            
            if (scorer.points >= 7 && (scorer.points - opponent.points) >= 2) {
                scorer.games++;
                state.scoreData.t1.points = 0;
                state.scoreData.t2.points = 0;
                state.isTiebreak = false;
                rotateServerAuto();
                checkSetCalculations(scorer, opponent);
            }
            renderDisplay();
            return;
        }

        // STANDARDS SCORING REGULAR GAME
        let gameWon = false;
        if (state.noAd) {
            if (scorer.points >= 4) gameWon = true;
        } else {
            if (scorer.points >= 4 && (scorer.points - opponent.points) >= 2) gameWon = true;
        }

        if (gameWon) {
            scorer.games++;
            state.scoreData.t1.points = 0;
            state.scoreData.t2.points = 0;
            rotateServerAuto();
            checkSetCalculations(scorer, opponent);
        } else if (!state.noAd && scorer.points >= 3 && opponent.points >= 3 && scorer.points === opponent.points) {
            state.scoreData.t1.points = 3;
            state.scoreData.t2.points = 3;
        }

        renderDisplay();
    }

    function checkSetCalculations(scorer, opponent) {
        let maxGames = 6; 
        if (state.matchFormat === 'short') maxGames = 4;
        if (state.matchFormat === 'pro') maxGames = 8;

        // Auto check if format triggers tiebreaker threshold
        if (state.scoreData.t1.games === maxGames && state.scoreData.t2.games === maxGames) {
            state.isTiebreak = true;
            return;
        }

        if (scorer.games >= maxGames && (scorer.games - opponent.games) >= 2) {
            scorer.sets++;
            state.scoreData.t1.games = 0;
            state.scoreData.t2.games = 0;
        }
    }

    function undoPoint() {
        if (state.history.length === 0) return;
        let lastState = state.history.pop();
        state.scoreData = lastState.scoreData;
        state.currentServer = lastState.currentServer;
        state.isTiebreak = lastState.isTiebreak || false;
        state.stats = lastState.stats || { 1: { winners: 0, errors: 0 }, 2: { winners: 0, errors: 0 }, 3: { winners: 0, errors: 0 }, 4: { winners: 0, errors: 0 } };
        renderDisplay();
    }

    function resetMatch() {
        if (confirm("Reset match scores and visual graphs back to zero?")) {
            localStorage.removeItem(STORAGE_KEY);
            state.isTiebreak = (state.matchFormat === 'tiebreak7' || state.matchFormat === 'tiebreak10');
            resetScorePreservingStats();
            state.stats = {
                1: { winners: 0, errors: 0 }, 2: { winners: 0, errors: 0 },
                3: { winners: 0, errors: 0 }, 4: { winners: 0, errors: 0 }
            };
            renderDisplay();
        }
    }

    function renderPerformanceCharts() {
        const container = document.getElementById('charts-wrapper-target');
        container.innerHTML = '';

        let maxBaseline = 1;
        for (let i = 1; i <= 4; i++) {
            if (state.stats[i].winners > maxBaseline) maxBaseline = state.stats[i].winners;
            if (state.stats[i].errors > maxBaseline) maxBaseline = state.stats[i].errors;
        }

        for (let i = 1; i <= 4; i++) {
            if (state.matchMode === 'singles' && (i === 2 || i === 4)) continue;

            let wPct = (state.stats[i].winners / maxBaseline) * 100;
            let ePct = (state.stats[i].errors / maxBaseline) * 100;

            let cardHTML = `
                <div class="player-chart-card">
                    <div class="chart-player-name">${getPlayerName(i)}</div>
                    <div class="graph-metric-row">
                        <div class="graph-meta-info"><span>Winners</span><span>${state.stats[i].winners}</span></div>
                        <div class="bar-track"><div class="bar-fill-indicator win-fill" style="width: ${wPct}%"></div></div>
                    </div>
                    <div class="graph-metric-row">
                        <div class="graph-meta-info"><span>Errors</span><span>${state.stats[i].errors}</span></div>
                        <div class="bar-track"><div class="bar-fill-indicator err-fill" style="width: ${ePct}%"></div></div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        }
    }

    function generateCSVString() {
        let text = "Match Parameter,Value/Metric\n";
        text += `Date,${document.getElementById('current-date').innerText}\n`;
        text += `Mode,${state.matchMode.toUpperCase()}\n`;
        text += `Format Rule Configuration,${document.getElementById('format-selector').options[document.getElementById('format-selector').selectedIndex].text}\n`;
        text += `Scoring Advantage Mode,${state.noAd ? "No-Advantage (Sudden Death)" : "Advantage Scoring"}\n`;
        text += `Current Match State,${state.isTiebreak ? "IN TIEBREAKER" : "Normal Play"}\n`;
        text += `Score Team 1,${state.scoreData.t1.sets} Sets / ${state.scoreData.t1.games} Games\n`;
        text += `Score Team 2,${state.scoreData.t2.sets} Sets / ${state.scoreData.t2.games} Games\n\n`;
        
        text += "Player,Winners,Errors\n";
        for (let i = 1; i <= 4; i++) {
            if (state.matchMode === 'singles' && (i === 2 || i === 4)) continue;
            let pName = getPlayerName(i).replace(/"/g, '""');
            text += `"${pName}",${state.stats[i].winners},${state.stats[i].errors}\n`;
        }
        return text;
    }

    function openReportModal() {
        document.getElementById('report-preview-box').innerText = generateCSVString();
        document.getElementById('report-modal').style.display = 'flex';
    }

    function closeReportModal() { document.getElementById('report-modal').style.display = 'none'; }

    function downloadStats() {
        const csvText = generateCSVString();
        const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        let fileDate = new Date().toISOString().slice(0, 10);
        link.setAttribute("download", `Tennis_Rules_Report_${fileDate}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        closeReportModal();
    }

    function renderDisplay() {
        let t1Out, t2Out;

        if (state.isTiebreak) {
            // Direct numbers rendered on board during any active tiebreakers
            t1Out = state.scoreData.t1.points;
            t2Out = state.scoreData.t2.points;
        } else {
            t1Out = scoreMap[Math.min(state.scoreData.t1.points, 4)];
            t2Out = scoreMap[Math.min(state.scoreData.t2.points, 4)];

            if (!state.noAd && state.scoreData.t1.points >= 3 && state.scoreData.t2.points >= 3) {
                if (state.scoreData.t1.points === state.scoreData.t2.points) { t1Out = "40"; t2Out = "40"; }
                else if (state.scoreData.t1.points > state.scoreData.t2.points) { t1Out = "A"; t2Out = "40"; }
                else { t1Out = "40"; t2Out = "A"; }
            }
        }

        document.getElementById('score-t1').innerText = t1Out;
        document.getElementById('score-t2').innerText = t2Out;

        document.getElementById('badge-t1').innerText = `${state.scoreData.t1.sets} Sets (${state.scoreData.t1.games} Games)`;
        document.getElementById('badge-t2').innerText = `${state.scoreData.t2.sets} Sets (${state.scoreData.t2.games} Games)`;

        document.getElementById('dot-p1a').classList.toggle('serving', state.currentServer === 1);
        document.getElementById('dot-p1b').classList.toggle('serving', state.currentServer === 2);
        document.getElementById('dot-p2a').classList.toggle('serving', state.currentServer === 3);
        document.getElementById('dot-p2b').classList.toggle('serving', state.currentServer === 4);

        renderPerformanceCharts();
        saveState();
    }

    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    const cache = localStorage.getItem(STORAGE_KEY);
    if (cache) {
        state = JSON.parse(cache);
        if (state.noAd === undefined) state.noAd = false;
        if (!state.matchFormat) state.matchFormat = 'standard';
        document.getElementById('format-selector').value = state.matchFormat;
        switchMatchMode(state.matchMode);
        renderNoAdButton();
    } else {
        switchMatchMode('singles');
        renderNoAdButton();
    }
</script>
</body>
</html>
