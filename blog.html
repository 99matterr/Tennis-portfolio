        /* Global setup matching the premium portfolio tone */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7; /* Modern off-white backdrop */
            color: #1d1d1f;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }
        
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
        }
        
        /* Clean animation for back navigation link */
        .back-link { 
            color: #0071e3; 
            text-decoration: none; 
            font-weight: 500; 
            display: inline-block;
            margin-bottom: 24px;
            transition: transform 0.2s ease;
        }
        .back-link:hover { 
            text-decoration: underline;
            transform: translateX(-4px);
        }

        /* Premium visual banner header with protective dark image tint */
        .page-header { 
            position: relative;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), url('big4.jpeg');
            background-size: cover;
            
            /* KEPT: Keeps the photo framing exactly as you liked it */
            background-position: center top;

            justify-content: center;
            min-height: 240px;

            text-align: center; 
            margin-bottom: 40px; 
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            box-sizing: border-box;
        }
